<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Deep dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12121a;stop-opacity:1" />
    </linearGradient>

    <!-- Mic gradient - warm amber/gold -->
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0a500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e07b00;stop-opacity:1" />
    </linearGradient>

    <!-- Wave glow gradient -->
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#f5c842;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c842;stop-opacity:0" />
    </linearGradient>

    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0a500;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#f0a500;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0" />
    </linearGradient>

    <!-- Outer ring gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e07b00;stop-opacity:0.2" />
    </linearGradient>

    <!-- Glow filter for mic -->
    <filter id="micGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Soft glow filter -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Inner circle clip -->
    <clipPath id="innerClip">
      <circle cx="256" cy="256" r="200"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Subtle noise texture overlay -->
  <circle cx="256" cy="256" r="256" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#ringGrad)" stroke-width="1.5" opacity="0.6" stroke-dasharray="8 4"/>

  <!-- Second ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#f5c842" stroke-width="0.5" opacity="0.15"/>

  <!-- Ambient glow behind mic -->
  <ellipse cx="256" cy="235" rx="80" ry="90" fill="#f0a500" opacity="0.06" filter="url(#softGlow)"/>

  <!-- Sound wave bars - left side (mirrored, organic heights) -->
  <!-- Far left -->
  <rect x="108" y="248" width="7" height="16" rx="3.5" fill="url(#waveGrad2)" opacity="0.5"/>
  <!-- Left 2 -->
  <rect x="122" y="238" width="7" height="36" rx="3.5" fill="url(#waveGrad1)" opacity="0.7"/>
  <!-- Left 3 -->
  <rect x="136" y="228" width="7" height="56" rx="3.5" fill="url(#waveGrad1)" opacity="0.85"/>
  <!-- Left 4 -->
  <rect x="150" y="218" width="7" height="76" rx="3.5" fill="url(#waveGrad1)" opacity="0.9"/>
  <!-- Left 5 (closest) -->
  <rect x="164" y="232" width="7" height="48" rx="3.5" fill="url(#waveGrad1)" opacity="0.75"/>

  <!-- Sound wave bars - right side -->
  <!-- Right 1 (closest) -->
  <rect x="341" y="232" width="7" height="48" rx="3.5" fill="url(#waveGrad1)" opacity="0.75"/>
  <!-- Right 2 -->
  <rect x="355" y="218" width="7" height="76" rx="3.5" fill="url(#waveGrad1)" opacity="0.9"/>
  <!-- Right 3 -->
  <rect x="369" y="228" width="7" height="56" rx="3.5" fill="url(#waveGrad1)" opacity="0.85"/>
  <!-- Right 4 -->
  <rect x="383" y="238" width="7" height="36" rx="3.5" fill="url(#waveGrad1)" opacity="0.7"/>
  <!-- Far right -->
  <rect x="397" y="248" width="7" height="16" rx="3.5" fill="url(#waveGrad2)" opacity="0.5"/>

  <!-- Microphone body -->
  <!-- Mic capsule (rounded rectangle) -->
  <rect x="221" y="140" width="70" height="110" rx="35" fill="url(#micGrad)" filter="url(#micGlow)"/>

  <!-- Mic grille lines -->
  <line x1="221" y1="185" x2="291" y2="185" stroke="#0a0a0f" stroke-width="1.5" opacity="0.3"/>
  <line x1="221" y1="198" x2="291" y2="198" stroke="#0a0a0f" stroke-width="1.5" opacity="0.3"/>
  <line x1="221" y1="211" x2="291" y2="211" stroke="#0a0a0f" stroke-width="1.5" opacity="0.3"/>
  <line x1="224" y1="172" x2="288" y2="172" stroke="#0a0a0f" stroke-width="1.5" opacity="0.25"/>

  <!-- Mic highlight -->
  <ellipse cx="245" cy="162" rx="10" ry="16" fill="#ffffff" opacity="0.15"/>

  <!-- Mic stand arm (curved) -->
  <path d="M 256 250 Q 256 285 256 295" stroke="#f0a500" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Mic stand arc -->
  <path d="M 210 295 Q 256 320 302 295" stroke="#f0a500" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Stand base -->
  <rect x="230" y="330" width="52" height="6" rx="3" fill="url(#micGrad)" opacity="0.9"/>

  <!-- Subtle arc glow under mic -->
  <path d="M 195 270 Q 256 310 317 270" stroke="#f5c842" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- Bottom text: STUDIO -->
  <text
    x="256"
    y="390"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="36"
    font-weight="700"
    letter-spacing="12"
    text-anchor="middle"
    fill="#f5c842"
    opacity="0.95"
  >STUDIO</text>

  <!-- Tagline -->
  <text
    x="256"
    y="415"
    font-family="Georgia, serif"
    font-size="11"
    font-weight="400"
    letter-spacing="4"
    text-anchor="middle"
    fill="#f0a500"
    opacity="0.6"
  >VOICE GENERATION</text>

  <!-- Corner accent dots -->
  <circle cx="256" cy="108" r="3" fill="#f5c842" opacity="0.4"/>
  <circle cx="246" cy="108" r="1.5" fill="#f5c842" opacity="0.25"/>
  <circle cx="266" cy="108" r="1.5" fill="#f5c842" opacity="0.25"/>

</svg>
